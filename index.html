<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<meta name="description" content="Murdoku — sudoku-style murder mystery logic puzzles. Place every suspect, satisfy every clue, and find who was alone with the victim.">
<title>Murdoku — Murder Mystery Logic Puzzles</title>
<meta name="theme-color" content="#12100e">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/font.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<header class="topbar">
  <button id="btn-home" class="brand" aria-label="Murdoku home">
    <span class="brand-mark" aria-hidden="true">🔎</span>
    <span class="brand-name">MURDOKU</span>
  </button>
  <div class="topbar-actions">
    <button id="btn-help" class="ghost-btn" aria-haspopup="dialog">How to play</button>
    <button id="btn-lang" class="icon-btn lang-btn" aria-label="Switch language">PT</button>
    <button id="btn-theme" class="icon-btn" aria-label="Toggle dark or light theme">◐</button>
  </div>
</header>

<main id="main">
  <!-- Home -->
  <section id="screen-home" class="screen" hidden>
    <div class="hero">
      <h1 class="hero-title"></h1>
      <p class="hero-sub"></p>
      <div class="hero-cta">
        <button id="btn-daily" class="primary-btn"></button>
        <button id="btn-random" class="secondary-btn"></button>
        <button id="btn-tutorial" class="secondary-btn"></button>
      </div>
    </div>
    <h2 id="home-section-title" class="section-title"></h2>
    <div id="campaign-list" class="case-grid" role="list"></div>
  </section>

  <!-- Game -->
  <section id="screen-game" class="screen" hidden>
    <div class="game-head">
      <button id="btn-back" class="ghost-btn"></button>
      <div class="game-title-wrap">
        <h1 id="game-title" class="game-title"></h1>
        <div class="game-meta">
          <span id="game-difficulty" class="chip"></span>
          <span id="game-progress" class="chip mono" aria-label="Suspects placed"></span>
          <span id="game-timer" class="chip mono" aria-label="Elapsed time">0:00</span>
        </div>
      </div>
      <button id="btn-story" class="ghost-btn" aria-haspopup="dialog"></button>
    </div>

    <div class="game-layout">
      <div class="board-wrap">
        <div id="chip-strip" class="chip-strip" aria-label="Quick suspect picker"></div>
        <div id="board" class="board" role="group" aria-label="Crime scene map"></div>
      </div>

      <aside class="side-panel">
        <div class="dock-head">
          <h2 id="dock-title" class="side-title"></h2>
          <span class="side-hint"></span>
        </div>
        <div id="dock" class="dock"></div>
      </aside>
    </div>

    <div class="toolbar" role="toolbar" aria-label="Game tools">
      <button id="tool-xmark" class="tool-btn" aria-pressed="false"></button>
      <button id="tool-undo" class="tool-btn"></button>
      <button id="tool-redo" class="tool-btn"></button>
      <button id="tool-check" class="tool-btn"></button>
      <button id="tool-hint" class="tool-btn"></button>
      <button id="tool-restart" class="tool-btn"></button>
      <button id="tool-accuse" class="accuse-btn" aria-disabled="true"></button>
    </div>

    <div class="settings-row">
      <label class="switch"><input type="checkbox" id="opt-live"> <span id="opt-live-label"></span></label>
      <label class="switch"><input type="checkbox" id="opt-autox"> <span id="opt-autox-label"></span></label>
    </div>
  </section>
</main>

<!-- Dialogs -->
<dialog id="dlg-story" class="dlg">
  <h2 id="dlg-story-title"></h2>
  <p id="dlg-story-text" class="story-text"></p>
  <div class="dlg-actions"><button id="story-close" class="primary-btn" data-close></button></div>
</dialog>

<dialog id="dlg-accuse" class="dlg">
  <h2></h2>
  <p class="dlg-sub"></p>
  <div id="accuse-lineup" class="lineup"></div>
  <div class="dlg-actions"><button id="accuse-close" class="ghost-btn" data-close></button></div>
</dialog>

<dialog id="dlg-verdict" class="dlg">
  <div id="verdict-emoji" class="verdict-emoji" aria-hidden="true"></div>
  <h2 id="verdict-title"></h2>
  <p id="verdict-text" class="story-text"></p>
  <div id="verdict-stats" class="stats-row"></div>
  <div class="dlg-actions">
    <button id="verdict-secondary" class="ghost-btn"></button>
    <button id="verdict-primary" class="primary-btn"></button>
  </div>
</dialog>

<dialog id="dlg-hint" class="dlg">
  <h2></h2>
  <p id="hint-text" class="story-text"></p>
  <div class="dlg-actions">
    <button id="hint-close" class="ghost-btn" data-close></button>
    <button id="hint-apply" class="primary-btn"></button>
  </div>
</dialog>

<dialog id="dlg-confirm" class="dlg">
  <h2 id="confirm-title"></h2>
  <p id="confirm-text" class="story-text"></p>
  <div class="dlg-actions">
    <button id="confirm-cancel" class="ghost-btn" data-close></button>
    <button id="confirm-yes" class="primary-btn"></button>
  </div>
</dialog>

<dialog id="dlg-help" class="dlg dlg-wide">
  <h2></h2>
  <div class="help-body">
    <ol class="help-steps"></ol>
    <p class="help-note"></p>
    <p class="help-kbd"></p>
  </div>
  <div class="dlg-actions"><button id="help-close" class="primary-btn" data-close></button></div>
</dialog>

<div id="toast" class="toast" role="status" aria-live="polite"></div>
<div id="sr-live" class="visually-hidden" aria-live="polite"></div>
<div id="confetti" class="confetti" aria-hidden="true"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
